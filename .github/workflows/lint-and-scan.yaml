name: lint-and-scan

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile relative to repo root"
        type: string
        default: "Dockerfile"
    outputs:
      hadolint_result:
        description: "hadolint job result"
        value: ${{ jobs.hadolint.outputs.result }}
      checkov_result:
        description: "checkov job result"
        value: ${{ jobs.checkov.outputs.result }}

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.service_path }}/${{ inputs.dockerfile_path }}
          failure-threshold: warning
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint-${{ inputs.service_name }}

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.service_path }}
          framework: dockerfile,secrets
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-${{ inputs.service_name }}
