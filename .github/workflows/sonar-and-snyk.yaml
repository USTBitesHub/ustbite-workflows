name: sonar-and-snyk

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        required: true
        type: string
      node-version:
        type: string
        default: "20"
      python-version:
        type: string
        default: "3.11"
    secrets:
      SNYK_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:

    outputs:
      sonarqube_result:
        description: "sonarqube job result"
        value: ${{ jobs.sonarqube.outputs.result }}
      snyk_result:
        description: "snyk job result"
        value: ${{ jobs.snyk.outputs.result }}

jobs:
  sonarqube:
    name: sonarqube
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.service_name }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ inputs.service_path }}/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    name: snyk
    runs-on: ubuntu-latest
    needs: sonarqube
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: npm install --legacy-peer-deps

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk scan (Node)
        if: inputs.runtime == 'node'
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Node)
        if: inputs.runtime == 'node'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (Python)
        if: inputs.runtime == 'python'
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Python)
        if: inputs.runtime == 'python'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Upload Snyk HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/snyk-report.html
          retention-days: 14
