name: helm-updater

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the microservice"
        required: true
        type: string
      image_tag:
        description: "New image tag to write into values.yaml"
        required: true
        type: string
      helm_values_path:
        description: "Path to values file inside ustbite-helm-charts repo"
        required: true
        type: string
      target_branch:
        description: "Branch to check out and push the values update to (main or develop)"
        required: false
        type: string
        default: main
    secrets:
      HELM_CHARTS_TOKEN:
        description: "PAT with contents:write on ustbite-helm-charts repo"
        required: true


jobs:

  update-helm-values:
    name: update helm values
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ustbite-helm-charts
        uses: actions/checkout@v4
        with:
          repository: USTBitesHub/ustbite-helm-charts
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          ref: ${{ inputs.target_branch }}

      - name: Update image tag
        run: |
          FILE="${{ inputs.helm_values_path }}"

          if [ ! -f "$FILE" ]; then
            if [ "${{ inputs.target_branch }}" = "main" ]; then
              FILE="charts/${{ inputs.service_name }}/values.prod.yaml"
            else
              FILE="charts/${{ inputs.service_name }}/values.dev.yaml"
            fi
          fi

          if [ ! -f "$FILE" ]; then
            echo "ERROR: values file not found: $FILE" 1>&2
            exit 1
          fi

          echo "Before:"
          grep "tag:" "$FILE" || true

          # Update only the tag under the image block
          IMAGE_TAG="${{ inputs.image_tag }}"
          export IMAGE_TAG
          python - <<'PY'
          import os
          import re

          path = os.environ["FILE"]
          tag = os.environ["IMAGE_TAG"]

          with open(path, "r", encoding="utf-8") as f:
            lines = f.readlines()

          out = []
          in_image = False
          image_indent = None
          updated = False

          for line in lines:
            m = re.match(r"^(\s*)image\s*:\s*$", line)
            if m:
              image_indent = len(m.group(1))
              in_image = True
              out.append(line)
              continue

            if in_image:
              if re.match(r"^\s*(#.*)?$", line):
                out.append(line)
                continue

              indent = len(re.match(r"^(\s*)", line).group(1))
              if indent <= image_indent:
                in_image = False

            if in_image and re.match(r"^\s*tag\s*:", line):
              indent = re.match(r"^(\s*)", line).group(1)
              out.append(f"{indent}tag: {tag}\n")
              updated = True
              continue

            out.append(line)

          if not updated:
            raise SystemExit(f"ERROR: no image.tag found in {path}")

          with open(path, "w", encoding="utf-8") as f:
            f.writelines(out)
          PY

          echo "After:"
          grep "tag:" "$FILE"
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name  "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$FILE"
          git diff --cached --quiet && echo "No changes — tag already up to date" && exit 0

          git commit -m "chore(${{ inputs.service_name }}): update image tag to ${{ inputs.image_tag }}"
          git push origin ${{ inputs.target_branch }}